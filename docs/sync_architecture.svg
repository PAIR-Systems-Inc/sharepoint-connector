<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 515" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="14" role="img">
  <title>SharePoint connector sync modes: manual/periodic (sync_once.py) and event-triggered (listener + watcher + deploy_fly_io.sh)</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="barrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- ============ Panel 1: Manual / periodic sync ============ -->
  <text x="30" y="34" font-weight="600" font-size="15" fill="#0f172a">Manual / periodic sync</text>

  <rect x="60" y="60" width="150" height="64" rx="8" fill="#eef2ff" stroke="#475569"/>
  <text x="135" y="88" text-anchor="middle">SharePoint</text>
  <text x="135" y="106" text-anchor="middle">site</text>

  <rect x="320" y="60" width="170" height="64" rx="8" fill="#fff7ed" stroke="#475569"/>
  <text x="405" y="96" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">sync_once.py</text>

  <rect x="600" y="60" width="140" height="64" rx="8" fill="#ecfdf5" stroke="#475569"/>
  <text x="670" y="96" text-anchor="middle">Goodmem</text>

  <line x1="210" y1="92" x2="318" y2="92" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="264" y="82" text-anchor="middle" fill="#64748b" font-size="12">pull changes</text>

  <line x1="490" y1="92" x2="598" y2="92" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="544" y="82" text-anchor="middle" fill="#64748b" font-size="12">ingest</text>

  <text x="405" y="150" text-anchor="middle" fill="#64748b" font-size="13">Run on demand or on a schedule (cron), from anywhere.</text>

  <line x1="30" y1="188" x2="790" y2="188" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ============ Panel 2: Event-triggered sync ============ -->
  <text x="30" y="226" font-weight="600" font-size="15" fill="#0f172a">Event-triggered sync</text>

  <!-- runtime boxes -->
  <rect x="30" y="268" width="150" height="72" rx="8" fill="#eef2ff" stroke="#475569"/>
  <text x="105" y="300" text-anchor="middle">SharePoint</text>
  <text x="105" y="320" text-anchor="middle">site</text>

  <rect x="300" y="268" width="170" height="72" rx="8" fill="#fff7ed" stroke="#475569"/>
  <text x="385" y="298" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">listener.py</text>
  <text x="385" y="320" text-anchor="middle" fill="#94a3b8" font-size="11">public host · HTTPS/TLS</text>

  <rect x="560" y="268" width="180" height="72" rx="8" fill="#ecfdf5" stroke="#475569"/>
  <text x="650" y="298" text-anchor="middle">Goodmem</text>
  <text x="650" y="320" text-anchor="middle" fill="#94a3b8" font-size="11">accessible to the listener</text>

  <!-- runtime arrows (numbered sequence) -->
  <line x1="180" y1="290" x2="298" y2="290" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="239" y="281" text-anchor="middle" fill="#64748b" font-size="12">1 · webhook</text>

  <line x1="298" y1="318" x2="182" y2="318" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="334" text-anchor="middle" fill="#64748b" font-size="12">2 · delta pull</text>

  <line x1="472" y1="294" x2="558" y2="294" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="515" y="285" text-anchor="middle" fill="#64748b" font-size="12">3 · sync</text>

  <!-- watcher: bottom-left (optional monitoring) -->
  <rect x="30" y="430" width="190" height="64" rx="8" fill="#eef2ff" stroke="#475569" stroke-dasharray="6 4"/>
  <text x="125" y="456" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">watch_listener.py</text>
  <text x="125" y="475" text-anchor="middle" fill="#64748b" font-size="11">optional · any host (your laptop)</text>

  <!-- deploy_fly_io.sh: provisioning, bottom-right -->
  <rect x="480" y="430" width="240" height="64" rx="8" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="600" y="466" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1e3a8a">./deploy_fly_io.sh</text>

  <!-- watcher polls listener (straight) -->
  <line x1="125" y1="430" x2="340" y2="342" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="408" text-anchor="middle" fill="#64748b" font-size="12">GET /activity (poll)</text>

  <!-- deploy connector to listener: always (straight, solid) -->
  <line x1="600" y1="430" x2="430" y2="342" stroke="#1d4ed8" stroke-width="1.5" marker-end="url(#barrow)"/>
  <text x="470" y="410" text-anchor="middle" fill="#1d4ed8" font-size="12">deploys (always)</text>

  <!-- deploy connector to Goodmem: optional (dashed) -->
  <line x1="650" y1="430" x2="650" y2="342" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#barrow)"/>
  <text x="662" y="366" text-anchor="start" fill="#1d4ed8" font-size="11">only with</text>
  <text x="662" y="381" text-anchor="start" fill="#1d4ed8" font-size="11">--hands-free</text>
  <text x="662" y="396" text-anchor="start" fill="#1d4ed8" font-size="11">or --goodmem-only</text>
</svg>
